name: Update Citations

on:
  schedule:
    # Run daily at 06:00 UTC (15:00 KST)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch citation counts from ADS
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
        run: python fetch_citations.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add citations.json
          git diff --cached --quiet || (git commit -m "Update citation counts [$(date -u +%Y-%m-%d)]" && git push)
